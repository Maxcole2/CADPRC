<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- CRITICAL IPHONE FIX: maximum-scale=1.0 and user-scalable=0 prevents iOS layout break on input focus -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Animal Services LIVE 2-WAY</title>
    
    <!-- FIREBASE LIBRARIES -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <!-- PDF GENERATION LIBRARY -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root {
            --bg-dark: #12181c; 
            --panel-bg: #1a2329; 
            --logo-blue: #254F71;
            --logo-peach: #EE835E;
            --paint-light-blue: #8caeab;
            --paint-med-blue: #61a89d;
            --paint-yellow: #f6cd8e;
            --paint-beige: #d1cbc1;

            --text-main: var(--paint-beige);
            --text-muted: var(--paint-light-blue);
            --border: var(--logo-blue);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        /* 100dvh correctly sizes against mobile keyboards/address bars */
        body { 
            background-color: var(--bg-dark); color: var(--text-main); 
            font-family: 'Consolas', 'Courier New', monospace; 
            height: 100vh; 
            height: 100dvh; 
            width: 100vw; 
            display: flex; flex-direction: column; overflow: hidden; 
        }
        
        header { 
            flex-shrink: 0; 
            background-color: var(--logo-blue); border-bottom: 3px solid var(--logo-peach); 
            padding: 10px 20px; display: flex; justify-content: space-between; 
            align-items: center; font-weight: bold; color: var(--paint-beige); 
        }
        .f12-btn { background: var(--logo-peach); color: #000; border: none; padding: 5px 15px; cursor: pointer; font-weight: bold; font-family: inherit; transition: opacity 0.2s; }
        .f12-btn:hover { opacity: 0.8; }
        
        #cad-container { display: flex; flex: 1; overflow: hidden; min-height: 0; }
        
        #queue-panel { 
            width: 30%; border-right: 2px solid var(--border); 
            display: flex; flex-direction: column; background-color: var(--panel-bg); 
            min-height: 0; 
        }
        .panel-title { 
            flex-shrink: 0; 
            background-color: var(--logo-blue); padding: 8px 10px; font-size: 0.9em; 
            color: var(--paint-beige); text-transform: uppercase; 
            display: flex; justify-content: space-between; align-items: center;
        }
        
        #case-list { 
            flex: 1; overflow-y: auto; min-height: 0; 
        }
        .case-item { padding: 10px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.2s; }
        .case-item:hover, .case-item.active { background-color: #23313a; border-left: 4px solid var(--logo-peach); }
        .case-id { font-weight: bold; color: var(--paint-beige); font-size: 1.1em; margin-bottom: 0; }
        
        .case-type { 
            font-size: 0.85em; padding: 4px 8px; border-radius: 4px; background-color: transparent; 
            display: inline-block; font-weight: bold; border: 1px solid currentColor;
            text-transform: uppercase; letter-spacing: 1px; margin-top: 8px;
        }

        .unread-badge {
            background-color: #ff073a; color: white; padding: 3px 8px;
            border-radius: 12px; font-size: 0.8em; font-weight: bold;
            text-transform: uppercase; animation: pulseNeon 0.8s infinite alternate;
        }
        @keyframes pulseNeon {
            from { box-shadow: 0 0 2px #ff073a; background-color: #cc0029; }
            to { box-shadow: 0 0 12px #ff073a; background-color: #ff073a; }
        }

        #right-workspace { 
            width: 70%; display: flex; flex-direction: column; 
            background-color: var(--bg-dark); position: relative; min-height: 0;
        }
        
        .workspace-view { 
            display: none; flex-direction: column; flex: 1; min-height: 0; 
        }
        .workspace-view.active { display: flex; }

        #empty-state { justify-content: center; align-items: center; color: var(--paint-light-blue); font-size: 1.2em; text-align: center; line-height: 1.5; }

        #new-case-panel { padding: 30px; background-color: var(--panel-bg); overflow-y: auto; }
        .form-container { max-width: 600px; margin: 0 auto; }
        .form-container h2 { margin-bottom: 20px; color: var(--logo-peach); border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        
        .modal-form-group { margin-bottom: 15px; position: relative; }
        .modal-form-group label { display: block; margin-bottom: 5px; color: var(--paint-light-blue); font-weight: bold; }
        .modal-form-group input, .modal-form-group select, .modal-form-group textarea { width: 100%; padding: 10px; background: #0a0d10; border: 1px solid var(--paint-med-blue); color: var(--paint-beige); font-family: inherit; font-size: 1em; resize: vertical;}
        .modal-form-group input:focus, .modal-form-group select:focus, .modal-form-group textarea:focus { outline: 2px solid var(--logo-peach); }
        
        .autocomplete-items {
            position: absolute; border: 1px solid var(--border); border-bottom: none; border-top: none; 
            z-index: 99; top: 100%; left: 0; right: 0; background-color: #0a0d10; max-height: 150px; overflow-y: auto;
        }
        .autocomplete-items div {
            padding: 10px; cursor: pointer; border-bottom: 1px solid var(--border); color: var(--paint-beige); font-size: 0.9em;
        }
        .autocomplete-items div:hover { background-color: var(--logo-peach); color: #000; }

        #jurisdiction-status { margin-top: 8px; font-weight: bold; font-size: 0.9em; padding: 5px; border-radius: 3px; display: none; text-align: center;}
        .jur-in { background-color: rgba(57, 255, 20, 0.1); color: #39ff14; border: 1px solid #39ff14; }
        .jur-out { background-color: rgba(255, 7, 58, 0.1); color: #ff073a; border: 1px solid #ff073a; }

        .modal-actions { display: flex; justify-content: flex-end; gap: 15px; margin-top: 20px; }
        .btn { padding: 10px 20px; cursor: pointer; font-family: inherit; border: none; font-weight: bold; font-size: 1em; }
        .btn-cancel { background: transparent; border: 1px solid var(--paint-light-blue); color: var(--paint-light-blue); }
        .btn-submit { background: var(--logo-peach); color: #000; }

        .details-grid { 
            flex-shrink: 0; 
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; 
            border-bottom: 2px solid var(--border); background-color: var(--panel-bg); 
        }
        .data-field { display: flex; flex-direction: column; }
        .data-field label { font-size: 0.8em; color: var(--paint-light-blue); text-transform: uppercase; }
        .data-field span { font-size: 1.1em; padding-top: 5px; }

        #chat-section { 
            flex: 1; display: flex; flex-direction: column; padding: 15px; 
            background-color: #0a0d10; min-height: 0; 
        }
        #chat-log { 
            flex: 1; overflow-y: auto; padding: 10px; border: 1px solid var(--border); 
            margin-bottom: 15px; background-color: var(--panel-bg); min-height: 0; 
        }
        .chat-msg { margin-bottom: 10px; font-size: 1em; line-height: 1.4; }
        .chat-time { color: var(--paint-light-blue); margin-right: 10px; font-size: 0.85em; }
        .chat-sender { color: var(--logo-peach); font-weight: bold; margin-right: 5px; }
        
        #chat-input-area { 
            flex-shrink: 0; 
            display: flex; gap: 10px; 
        }
        #chat-input { flex: 1; padding: 12px; background: var(--panel-bg); border: 1px solid var(--paint-med-blue); color: var(--paint-beige); font-family: inherit; font-size: 1em; }
        
        .clear-btn { background: var(--logo-peach); color: #000; border: none; padding: 5px 10px; cursor: pointer; font-weight: bold; font-family: inherit; font-size: 0.8em; }
        #connection-status { font-size: 0.8em; margin-left: 10px; color: var(--paint-yellow); }

        /* =========================================
           MOBILE & IPHONE RESPONSIVE STYLES
           ========================================= */
        @media (max-width: 768px) {
            /* Compress header space to leave room for chat */
            header {
                flex-wrap: wrap; justify-content: center; gap: 5px; padding: 5px 10px; font-size: 0.9em; text-align: center;
            }

            #cad-container { flex-direction: column; }

            /* Compress the queue significantly so it doesn't take over the screen */
            #queue-panel {
                width: 100%;
                flex: 0 1 20%; 
                min-height: 65px; 
                border-right: none;
                border-bottom: 2px solid var(--border);
            }

            .panel-title { padding: 5px 8px; font-size: 0.8em; }

            #right-workspace { width: 100%; flex: 1 1 auto; }

            /* Compress details grid vertically to protect chat visibility */
            .details-grid {
                grid-template-columns: 1fr;
                gap: 5px;
                padding: 10px;
                flex-shrink: 1;
                overflow-y: auto; 
                max-height: 110px; /* Crucial: Locks this area so it doesn't crush the chat */
            }
            .data-field[style*="grid-column: span 2;"] { grid-column: span 1 !important; }
            .data-field label { font-size: 0.7em; }
            .data-field span { font-size: 0.9em; padding-top: 2px; }
            
            /* CRITICAL IPHONE FIX: Inputs must be at least 16px to prevent iOS auto-zoom bug */
            input, select, textarea {
                font-size: 16px !important; 
            }

            /* --- CHAT AREA ENHANCEMENTS FOR IPHONE --- */
            #chat-section {
                padding: 10px;
                padding-bottom: max(10px, env(safe-area-inset-bottom)); 
            }
            
            /* Make messages noticeably larger and easier to read */
            .chat-msg { 
                font-size: 1.15rem; /* Larger text */
                margin-bottom: 12px;
                line-height: 1.5; 
            }
            .chat-time { font-size: 0.85rem; }
            .chat-sender { font-size: 1.05rem; }

            /* Make the input box taller and easier to tap */
            #chat-input { 
                padding: 15px 12px; 
                font-size: 16px !important; 
                height: 50px; 
            }
            
            #new-case-panel { padding: 15px; }
            .modal-actions { flex-direction: column; gap: 10px; }
            .modal-actions .btn { width: 100%; }
            .clear-btn { font-size: 0.7em; padding: 6px 10px; }
        }
    </style>
</head>
<body>

    <!-- AUDIO ALERTS -->
    <audio id="msg-sound" src="https://actions.google.com/sounds/v1/ui/beep_short.ogg" preload="auto"></audio>
    <audio id="alert-sound" src="https://actions.google.com/sounds/v1/alarms/bugle_tune.ogg" preload="auto"></audio>

    <header>
        <div>ANIMAL SERVICES DASHBOARD <span id="connection-status">Connecting...</span></div>
        <div id="clock">00:00:00</div>
        <button class="f12-btn" onclick="showView('new-case-panel')">NEW CASE [F12]</button>
    </header>

    <div id="cad-container">
        <!-- Active Queue -->
        <div id="queue-panel">
            <div class="panel-title">ACTIVE INCIDENTS</div>
            <div id="case-list"></div>
        </div>

        <!-- Right Workspace Container -->
        <div id="right-workspace">
            
            <div id="empty-state" class="workspace-view active">
                SELECT A CASE FROM THE QUEUE<br><br>OR<br><br>HIT F12 TO CREATE NEW INCIDENT
            </div>

            <!-- F12 Form -->
            <div id="new-case-panel" class="workspace-view">
                <div class="form-container">
                    <h2>CREATE NEW INCIDENT</h2>
                    
                    <div class="modal-form-group">
                        <label>Call Type</label>
                        <select id="input-type">
                            <option value="Owner Surrender">Owner Surrender</option>
                            <option value="Community Cats">Community Cats</option>
                            <option value="Pet Pantry">Pet Pantry</option>
                            <option value="Safety-Net Information">Safety-Net Information</option>
                            <option value="Sick Community Cat (Willing to Transport)">Sick Community Cat (Willing to Transport)</option>
                            <option value="Sick Stray (Willing to Transport)">Sick Stray (Willing to Transport)</option>
                            <option value="Check in for Foster">Check in for Foster</option>
                            <option value="Check in for Intake">Check in for Intake</option>
                        </select>
                    </div>

                    <div class="modal-form-group"><label>Caller Name</label><input type="text" id="input-name" placeholder="Last, First"></div>
                    <div class="modal-form-group"><label>Phone Number</label><input type="text" id="input-phone" placeholder="(XXX) XXX-XXXX"></div>
                    <div class="modal-form-group"><label>Email</label><input type="text" id="input-email" placeholder="example@email.com"></div>
                    
                    <div class="modal-form-group">
                        <label>Address / Location</label>
                        <input type="text" id="input-address" placeholder="Start typing address..." autocomplete="off">
                        <div id="address-suggestions" class="autocomplete-items"></div>
                        <div id="jurisdiction-status"></div>
                    </div>
                    
                    <div class="modal-form-group">
                        <label>Initial Notes / Narrative</label>
                        <textarea id="input-notes" rows="3" placeholder="Enter initial details or case context..."></textarea>
                    </div>

                    <div class="modal-actions">
                        <button class="btn btn-cancel" onclick="showView('empty-state')">CANCEL</button>
                        <button class="btn btn-submit" onclick="submitNewCase()">CREATE</button>
                    </div>
                </div>
            </div>

            <!-- Details Panel -->
            <div id="details-panel" class="workspace-view">
                <div class="panel-title">
                    <span>INCIDENT DETAILS - <span id="view-id"></span></span>
                    <button class="clear-btn" onclick="clearCase()">CLOSE & CLEAR CASE</button>
                </div>
                
                <div class="details-grid">
                    <div class="data-field"><label>Call Type</label><span id="view-type"></span></div>
                    <div class="data-field"><label>Caller Name</label><span id="view-name"></span></div>
                    <div class="data-field"><label>Phone Number</label><span id="view-phone"></span></div>
                    <div class="data-field"><label>Jurisdiction Status</label><span id="view-jur"></span></div>
                    <div class="data-field" style="grid-column: span 2;"><label>Address / Location</label><span id="view-address"></span></div>
                </div>

                <div class="panel-title">INCIDENT NARRATIVE / LIVE CHAT</div>
                <div id="chat-section">
                    <div id="chat-log"></div>
                    <div id="chat-input-area">
                        <input type="text" id="chat-input" placeholder="Type narrative/chat and hit Enter..." disabled>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // ==========================================
        // 1. FIREBASE CONFIGURATION
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyDWf1mQ9lDkjGDK6rb_o3Up0Wbehgnc5J0",
            authDomain: "cadprc-4a3d3.firebaseapp.com",
            databaseURL: "https://cadprc-4a3d3-default-rtdb.firebaseio.com",
            projectId: "cadprc-4a3d3",
            storageBucket: "cadprc-4a3d3.firebasestorage.app",
            messagingSenderId: "189685201595",
            appId: "1:189685201595:web:a8588492385bf59b1e479e",
            measurementId: "G-50M4W9NSSY"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const dbRef = database.ref('cad_cases');

        // ==========================================
        // 2. CAD STATE & INITIALIZATION
        // ==========================================
        let cases = [];
        let activeCaseId = null;
        let lastChatCounts = {}; 
        let userReadCounts = {}; 
        let knownCaseIds = new Set();
        let isFirstLoad = true;
        let currentJurisdictionData = { isCovered: false, desc: "UNKNOWN", rawStatus: "" };
        
        let termId = localStorage.getItem('dispatcher_id');
        if (!termId) {
            termId = prompt("Enter Your Initials:") || "UNKNOWN";
            localStorage.setItem('dispatcher_id', termId);
        }

        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toTimeString().split(' ')[0] + " | " + termId;
        }, 1000);

        dbRef.on('value', (snapshot) => {
            document.getElementById('connection-status').innerText = "(CONNECTED)";
            document.getElementById('connection-status').style.color = "var(--paint-med-blue)";
            
            const newCasesData = snapshot.val() || [];
            let playMsgDing = false;
            let playLoudAlarm = false;

            newCasesData.forEach(c => {
                if (!isFirstLoad && !knownCaseIds.has(c.id)) {
                    if (c.chat && c.chat[0] && !c.chat[0].msg.includes(`by ${termId}`)) {
                        playLoudAlarm = true;
                    }
                }

                let clen = c.chat ? c.chat.length : 0;
                
                if (lastChatCounts[c.id] !== undefined && clen > lastChatCounts[c.id]) {
                    const lastMsg = c.chat[clen - 1];
                    if (lastMsg.sender !== termId && lastMsg.sender !== 'SYSTEM') { 
                        playMsgDing = true; 
                    }
                }
                lastChatCounts[c.id] = clen;
                knownCaseIds.add(c.id);
            });

            if (playLoudAlarm) {
                let alertSnd = document.getElementById('alert-sound');
                alertSnd.volume = 1.0; alertSnd.play().catch(e => console.log("Audio blocked"));
            } else if (playMsgDing) {
                let msgSnd = document.getElementById('msg-sound');
                msgSnd.volume = 1.0; msgSnd.play().catch(e => console.log("Audio blocked"));
            }

            isFirstLoad = false;
            cases = newCasesData;
            
            renderQueue();
            
            if (activeCaseId) {
                loadCaseDetails(activeCaseId, false);
            }
        });

        // ==========================================
        // 3. ADDRESS AUTOCOMPLETE & JURISDICTION 
        // ==========================================
        let typingTimer;
        const addressInput = document.getElementById('input-address');
        const suggestionsBox = document.getElementById('address-suggestions');
        const jurStatusBox = document.getElementById('jurisdiction-status');

        addressInput.addEventListener('input', function() {
            clearTimeout(typingTimer);
            suggestionsBox.innerHTML = '';
            jurStatusBox.style.display = 'none';
            
            let val = this.value;
            if(val.length < 4) return; 
            
            typingTimer = setTimeout(() => fetchAddresses(val), 500);
        });

        async function fetchAddresses(query) {
            try {
                let res = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&addressdetails=1&limit=5&countrycodes=us`);
                let data = await res.json();
                
                suggestionsBox.innerHTML = '';
                data.forEach(place => {
                    let div = document.createElement('div');
                    div.innerText = place.display_name;
                    div.onclick = function() {
                        addressInput.value = place.display_name;
                        suggestionsBox.innerHTML = '';
                        checkJurisdiction(place.address);
                    };
                    suggestionsBox.appendChild(div);
                });
            } catch (err) {
                console.error("Geocoding failed", err);
            }
        }

        function checkJurisdiction(addr) {
            if (!addr) return;
            let state = (addr.state || "Unknown").toLowerCase();
            let county = (addr.county || "Unknown").toLowerCase();
            let city = (addr.city || addr.town || addr.village || addr.municipality || "Unknown").toLowerCase();
            
            let isCovered = false;

            if (state === "south carolina") {
                const coveredCounties = ["cherokee county", "spartanburg county", "union county"];
                const coveredCities = ["greer", "greenville"];
                if (coveredCounties.includes(county) || coveredCities.includes(city)) {
                    isCovered = true;
                }
            }

            let displayLoc = city !== "unknown" ? city : county;
            currentJurisdictionData = {
                isCovered: isCovered,
                desc: `${displayLoc}, SC`,
                rawStatus: isCovered ? `✅ IN JURISDICTION (${displayLoc}, SC)` : `❌ OUT OF JURISDICTION (${displayLoc}, ${state})`
            };

            jurStatusBox.style.display = 'block';
            jurStatusBox.className = isCovered ? 'jur-in' : 'jur-out';
            jurStatusBox.innerText = currentJurisdictionData.rawStatus;
        }

        document.addEventListener("click", function (e) {
            if (e.target !== addressInput) suggestionsBox.innerHTML = '';
        });

        // ==========================================
        // 4. CORE FUNCTIONS & MOBILE FIXES
        // ==========================================

        document.addEventListener('keydown', (e) => {
            if (e.key === 'F12') { 
                e.preventDefault(); 
                showView('new-case-panel');
                document.getElementById('input-name').focus();
            }
        });

        const chatInput = document.getElementById('chat-input');
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && e.target.value.trim() !== '') {
                sendMessage(e.target.value.trim());
                e.target.value = '';
            }
        });

        // iOS Keyboard Auto-Scroll Fix: Ensures log is visible when keyboard pops up
        chatInput.addEventListener('focus', function() {
            setTimeout(() => {
                const log = document.getElementById('chat-log');
                if(log) log.scrollTop = log.scrollHeight;
                this.scrollIntoView({ behavior: 'smooth', block: 'end' });
            }, 400); // 400ms allows time for the iOS keyboard animation to complete
        });

        function showView(viewId) {
            document.querySelectorAll('.workspace-view').forEach(el => el.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            
            if (viewId === 'new-case-panel') {
                ['input-name', 'input-phone', 'input-email', 'input-address', 'input-notes'].forEach(id => document.getElementById(id).value = '');
                jurStatusBox.style.display = 'none';
                currentJurisdictionData = { isCovered: false, desc: "UNKNOWN", rawStatus: "" };
            }
            
            if (viewId === 'details-panel' && activeCaseId) {
                const c = cases.find(x => x.id === activeCaseId);
                userReadCounts[activeCaseId] = c && c.chat ? c.chat.length : 0;
                renderQueue(); 
            }
        }

        function submitNewCase() {
            const initialNotes = document.getElementById('input-notes').value.trim();
            const jurString = currentJurisdictionData.rawStatus || "UNKNOWN JURISDICTION";

            const newCase = {
                id: 'CAS-' + new Date().getTime().toString().slice(-6),
                type: document.getElementById('input-type').value,
                name: document.getElementById('input-name').value || 'UNKNOWN',
                phone: document.getElementById('input-phone').value || 'UNKNOWN',
                email: document.getElementById('input-email').value || 'N/A',
                address: document.getElementById('input-address').value || 'UNKNOWN',
                jurisdiction: jurString,
                chat: [{
                    time: new Date().toTimeString().split(' ')[0],
                    sender: 'SYSTEM',
                    msg: `Incident created by ${termId}. Type: ${document.getElementById('input-type').value}.`
                }]
            };

            if (initialNotes !== "") {
                newCase.chat.push({ time: new Date().toTimeString().split(' ')[0], sender: termId, msg: `INITIAL NARRATIVE: ${initialNotes}` });
            }

            cases.unshift(newCase);
            userReadCounts[newCase.id] = newCase.chat.length; 
            
            dbRef.set(cases); 
            loadCaseDetails(newCase.id, true); 
        }

        function renderQueue() {
            const list = document.getElementById('case-list');
            list.innerHTML = '';
            cases.forEach(c => {
                const div = document.createElement('div');
                div.className = `case-item ${activeCaseId === c.id ? 'active' : ''}`;
                div.onclick = () => loadCaseDetails(c.id, true);
                
                const neonColor = getTypeColor(c.type);
                
                let totalMessages = c.chat ? c.chat.length : 0;
                let readMessages = userReadCounts[c.id] || 0;
                let unreadCount = totalMessages - readMessages;
                let badgeHTML = unreadCount > 0 ? `<div class="unread-badge">${unreadCount} New</div>` : '';

                div.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <div class="case-id">${c.id} - ${c.name}</div>
                        ${badgeHTML}
                    </div>
                    <div class="case-type" style="color: ${neonColor}; box-shadow: 0 0 5px ${neonColor} inset, 0 0 8px ${neonColor}; text-shadow: 0 0 5px ${neonColor};">
                        ${c.type}
                    </div>`;
                list.appendChild(div);
            });
        }

        function loadCaseDetails(id, forceViewSwitch = false) {
            activeCaseId = id;
            const c = cases.find(x => x.id === id);
            if (!c) { 
                if (forceViewSwitch) showView('empty-state'); 
                return; 
            }

            if (forceViewSwitch) showView('details-panel');

            const isLookingAtDetails = document.getElementById('details-panel').classList.contains('active');
            if (isLookingAtDetails) {
                userReadCounts[id] = c.chat ? c.chat.length : 0; 
            }

            const neonColor = getTypeColor(c.type);

            document.getElementById('view-id').innerText = c.id;
            
            const viewType = document.getElementById('view-type');
            viewType.innerText = c.type;
            viewType.style.color = neonColor;
            viewType.style.textShadow = `0 0 8px ${neonColor}`; 

            document.getElementById('view-name').innerText = c.name;
            document.getElementById('view-phone').innerText = c.phone;
            
            const viewJur = document.getElementById('view-jur');
            viewJur.innerText = c.jurisdiction || "UNKNOWN";
            if(viewJur.innerText.includes("✅")) {
                viewJur.style.color = "#39ff14"; 
            } else if (viewJur.innerText.includes("❌")) {
                viewJur.style.color = "#ff073a"; 
            } else {
                viewJur.style.color = "var(--paint-beige)";
            }

            document.getElementById('view-address').innerText = c.address;

            const log = document.getElementById('chat-log');
            log.innerHTML = '';
            if (c.chat) {
                c.chat.forEach(msg => {
                    const msgDiv = document.createElement('div');
                    msgDiv.className = 'chat-msg';
                    msgDiv.innerHTML = `<span class="chat-time">[${msg.time}]</span> <span class="chat-sender">${msg.sender}:</span> <span class="chat-text">${msg.msg}</span>`;
                    log.appendChild(msgDiv);
                });
            }
            log.scrollTop = log.scrollHeight;

            document.getElementById('chat-input').disabled = false;
            renderQueue(); 
        }

        function sendMessage(msgText) {
            if (!activeCaseId) return;
            const c = cases.find(x => x.id === activeCaseId);
            
            if (!c.chat) c.chat = [];
            c.chat.push({
                time: new Date().toTimeString().split(' ')[0],
                sender: termId,
                msg: msgText
            });

            userReadCounts[activeCaseId] = c.chat.length;
            dbRef.set(cases); 
        }

        // ==========================================
        // 5. PDF & CLEAR CASE LOGIC
        // ==========================================
        
        async function clearCase() {
            if (!activeCaseId) return;
            
            const c = cases.find(x => x.id === activeCaseId);
            const wantCopy = confirm("Do you want a copy of this case downloaded as a PDF before clearing?");
            
            if (wantCopy) {
                generatePDF(c);
            }

            cases = cases.filter(x => x.id !== activeCaseId);
            dbRef.set(cases);
            activeCaseId = null;
            showView('empty-state');
        }

        function generatePDF(c) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            let y = 20; 
            
            doc.setFontSize(18);
            doc.setTextColor(37, 79, 113); 
            doc.text(`INCIDENT REPORT: ${c.id}`, 15, y);
            y += 10;
            
            doc.setFontSize(12);
            doc.setTextColor(0, 0, 0);
            doc.text(`Call Type: ${c.type}`, 15, y); y += 7;
            doc.text(`Caller Name: ${c.name}`, 15, y); y += 7;
            doc.text(`Phone: ${c.phone}   |   Email: ${c.email}`, 15, y); y += 7;
            doc.text(`Location: ${c.address}`, 15, y); y += 7;
            doc.text(`Jurisdiction: ${c.jurisdiction}`, 15, y); y += 12;

            doc.setDrawColor(200);
            doc.line(15, y, 195, y); y += 10;
            
            doc.setFontSize(14);
            doc.setTextColor(238, 131, 94); 
            doc.text("NARRATIVE / CHAT LOG", 15, y); y += 8;
            
            doc.setFontSize(11);
            doc.setTextColor(0, 0, 0);
            
            if(c.chat) {
                c.chat.forEach(msg => {
                    const lineStr = `[${msg.time}] ${msg.sender}: ${msg.msg}`;
                    const lines = doc.splitTextToSize(lineStr, 175);
                    
                    lines.forEach(line => {
                        if (y > 280) { doc.addPage(); y = 20; }
                        doc.text(line, 15, y); y += 6;
                    });
                    y += 2; 
                });
            }

            doc.save(`${c.id}_Report.pdf`);
        }

        function getTypeColor(type) {
            switch(type) {
                case 'Sick Community Cat (Willing to Transport)': 
                case 'Sick Stray (Willing to Transport)': return '#ff073a'; 
                case 'Check in for Intake': return '#b026ff'; 
                case 'Check in for Foster': return '#ff5f1f'; 
                case 'Owner Surrender': return '#fff01f'; 
                case 'Community Cats': return '#ff00ff'; 
                case 'Pet Pantry': return '#39ff14'; 
                case 'Safety-Net Information': return '#00ffff'; 
                default: return '#00ffff';
            }
        }
    </script>
</body>
